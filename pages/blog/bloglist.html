<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs | DU</title>
    <link rel="stylesheet" href="../../css/pages/blog/blog.css">
    <script src="../../js/lib.js"></script>
    <script src="../../js/pages/blog/label2word.js"></script>
</head>

<body>
    <div class="main-wrapper">
        <div class="nav">
            <div class="nav-left">
                <a href="../../index.html">Return Homepage</a>
            </div>
            <div class="nav-right">
                <div class="avatar"></div>
                <p class="nav-name" id="username" onclick="">Minsecrus</p>
            </div>
        </div>
        <div class="main">
            <div class="main-left">
                <h1>Blogs - "<span id="blog-keyword">mdr</span>":</h1>
                <ul class="blogs" id="blogs-root">
                </ul>
            </div>
            <div class="main-right">
                <h1>keyword: <span id="keyword">mdr</span></h1>
                <p><span id="blog-cnt">0</span>&nbsp;result<span id="result-s">s</span></p>
            </div>
        </div>
    </div>
    <script>
        const $$$ = x => document.createElement(x)
        const blogs_root = $('#blogs-root')

        function addBlog(author, title, description, likes, favorites, labels) {
            let ele = $$$("li");
            ele.classList.add("blog");

            let eba = $$$('div');
            eba.classList.add('blog-author');
            let ebta = $$$('div');
            ebta.classList.add('blog-title-avatar');
            eba.appendChild(ebta);
            let eban = $$$('a');
            eban.classList.add('blog-author-name');
            eban.innerText = author;
            eba.appendChild(eban);
            ele.appendChild(eba);

            let ebtw = $$$("div");
            ebtw.classList.add('blog-title-wrapper');

            let ebt = $$$("a");
            ebt.classList.add('blog-title');
            ebt.innerText = title;
            ebtw.appendChild(ebt);

            let lab = $$$('div');
            lab.classList.add('labels')
            let n;
            for (let i = 0; i < labels.length; i++) {
                n = $$$('div');
                n.classList.add('label');
                n.classList.add(labels[i]);
                n.innerText = label2word[labels[i]];
                lab.appendChild(n)
            }
            ebtw.appendChild(lab);

            let ebdw = $$$('div');
            ebdw.classList.add('blog-description-wrapper')

            let ebd = $$$("p");
            ebd.classList.add('blog-description');
            ebd.innerText = description;
            ebdw.appendChild(ebd);

            let popular = $$$('p');
            popular.classList.add('popular');
            popular.innerHTML = "<span class=\"popular-num\">" + likes.toString() + "</span>\n" +
                "&nbsp;likes&nbsp;&nbsp;\n" +
                "<span class=\"popular-num\">" + favorites.toString() + "</span>\n" +
                "&nbsp;favorites";
            ebdw.appendChild(popular);

            ele.appendChild(ebtw);
            ele.appendChild(ebdw);

            blogs_root.appendChild(ele);
            $('#blog-cnt').innerText = String(Number($('#blog-cnt').innerText) + 1)
            if (Number($('#blog-cnt').innerText) > 1) {
                $('#result-s').innerText = 's'
            } else {
                $('#result-s').innerText = ''
            }
        }

        addBlog(
            'Minsecrus dreamers',
            'C++ High Precision Integer Library',
            'using std::vector',
            114,
            514,
            ['c', 'cpp', 'fp']
        );
        /*
        addBlog(
            'mdr',
            'DUNote',
            'app app app app app app app app app ',
            13,
            15,
            ["pl", "linux", "rust", "py", "java", "go"]
        );
        addBlog(
            'Timer',
            'femd',
            'Extensible markdown',
            114514,
            1919810,
            ["js", "md"]
        )*/
    </script>
</body>

</html>
